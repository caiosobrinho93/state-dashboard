<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23e85d04' rx='20' width='100' height='100'/><circle cx='35' cy='50' r='12' fill='white'/><circle cx='65' cy='50' r='12' fill='white'/><rect x='25' y='68' width='50' height='8' rx='4' fill='white'/></svg>">
    <title>Digital Corte</title>
    <meta name="description" content="Sistema de gestão para marcenaria">
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>
    <div class="app">
        <!-- Top Bar -->
        <header class="topbar">
            <div class="topbar-left">
                <a href="index.html" class="topbar-logo">
                    <div class="logo-icon">DC</div>
                    <span class="logo-text">Digital Corte</span>
                </a>
                
                <nav class="icon-nav">
                    <button class="icon-nav-btn active" data-module="dashboard" title="Dashboard">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="4" rx="1"/><rect x="14" y="10" width="7" height="11" rx="1"/><rect x="3" y="13" width="7" height="8" rx="1"/></svg>
                    </button>
                    <button class="icon-nav-btn" data-module="orcamentos" title="Orçamentos">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"/><path d="M14 2v6h6"/><path d="M16 13H8"/><path d="M16 17H8"/></svg>
                    </button>
                    <button class="icon-nav-btn" data-module="clientes" title="Clientes">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
                    </button>
                    <button class="icon-nav-btn" data-module="projetos" title="Projetos">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
                    </button>
                    <button class="icon-nav-btn" data-module="estoque" title="Estoque">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 16V8l-7-4-7 4v8l7 4 7-4z"/></svg>
                        <span class="badge" id="estoque-alert-badge" style="display:none">0</span>
                    </button>
                    <button class="icon-nav-btn" data-module="financeiro" title="Financeiro">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                    </button>
                    <button class="icon-nav-btn" data-module="negociacoes" title="Negociações">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="m22 8-4 4-2-2"/></svg>
                    </button>
                    <button class="icon-nav-btn" data-module="metricas" title="Métricas">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18 20V10"/><path d="M12 20V4"/><path d="M6 20v-6"/></svg>
                    </button>
                </nav>
            </div>
            
            <div class="topbar-right">
                <span class="date-display" id="current-date"></span>
                <a href="index.html" class="icon-nav-btn" title="Voltar ao site">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
                </a>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main">
            <div class="main-content" id="main-content">
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="shared/store.js"></script>
    <script src="shared/utils.js"></script>
    <script src="modules/dashboard.js"></script>
    <script src="modules/orcamento.js"></script>
    <script src="modules/estoque.js"></script>
    <script src="modules/clientes.js"></script>
    <script src="modules/projetos.js"></script>
    <script src="modules/financeiro.js"></script>
    <script src="modules/negociacoes.js"></script>
    <script src="modules/metricas.js"></script>
    <script src="app.js"></script>
</body>
</html>
